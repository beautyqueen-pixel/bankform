<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Agent Pro - Full Version</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { 
            --bg-body: #121212; 
            --neon-purple: #bc13fe;
            --neon-cyan: #00f3ff;
        }

        * { box-sizing: border-box; font-family: 'Arial Black', sans-serif; }
        body { margin: 10px; background: var(--bg-body); color: #fff; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 480px; background: #1a1a1a; min-height: 100vh; padding-bottom: 20px;}

        #form-to-share {
            background: #0a1f14;
            padding: 4px;
            border: 5px solid #075e74;
        }
        
        .header-box { 
            background: linear-gradient(145deg, #0b4fa3, #0a3d7c); 
            padding: 8px 20px; text-align: center; border: 2px solid #ddd; margin-bottom: 5px; 
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }

        .title-design {
            background: linear-gradient(180deg, #44ceef 0%, #0001ff 0%); 
            padding: 2px; border-radius: 4px; color: #ffffff; border: 1px solid #fff;
            min-width: 60%; font-weight: 900; text-transform: uppercase; font-size: 14px;
        }

        .row { display: flex; margin-bottom: 0px; background: #0b4894; padding: 2px 0px; align-items: center; border: 1px solid #ddd; }
        .label { width: 110px; min-width: 110px; padding: 4px 10px; font-size: 11px; font-weight: bold; color: white; background: #000; border: 1px solid; }
        .input-wrapper { width: 100%; background: white; min-height: 28px; display: flex; align-items: center; border: 2px solid #0bcd407f; }
        
        .input-box { width: 100%; border: none; outline: none; background: transparent; font-size: 16px; font-weight: 900; color: black; padding: 2px 5px; white-space: nowrap; overflow: hidden; }

        .controls { background: #0c700682; padding: 10px; width: 100%; }
        .btn-row { display: flex; gap: 2px; margin-bottom: 5px; flex-wrap: wrap; }
        button { border: 3px solid #fff; border-radius: 999px; font-weight: 900; cursor: pointer; color: white; padding: 12px 5px; font-size: 10px; flex: 1; text-transform: uppercase; }

        .btn-save { background: linear-gradient(180deg, #44b678 0%, #27ae60 100%); }
        .btn-share { background: linear-gradient(180deg, #ff4081 0%, #e91e63 100%); }
        .btn-clear { background: linear-gradient(180deg, #95a5a6 0%, #7f8c8d 100%); }

        .list-item { background: #e7eae879; padding: 5px 10px; margin-bottom: 2px; border-radius: 6px; border-left: 5px solid var(--neon-cyan); cursor: pointer; font-size: 12px; }
        .dashboard { display: flex; gap: 5px; padding: 10px; width: 100%; justify-content: space-between; }
        .dash-btn { flex: 1; padding: 5px; text-align: center; font-size: 10px; color: #fff; background: #222; border: 1px solid #fff; border-radius: 10px; cursor: pointer; }

        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:3000; justify-content:center; align-items:center; }
    </style>
</head>
<body>

<div class="modal-overlay" id="overlay" onclick="closeDialog()">
    <div style="background:#222; border:3px solid gold; padding:20px; border-radius:20px; width:85%; text-align:center;" onclick="event.stopPropagation()">
        <h3 style="color:gold;">OPTIONS</h3>
        <button class="btn-save" style="width:100%; margin-bottom:10px;" onclick="processImage('download')">💾 DOWNLOAD PDF</button>
        <button class="btn-share" style="width:100%; margin-bottom:10px;" onclick="processImage('share')">📤 SHARE ON WHATSAPP</button>
    </div>
</div>

<div class="app-container">
    <div id="form-to-share">
       <div class="header-box">
            <div class="title-design" id="head-agent">AGENT : NAME</div>
            <div class="title-design" id="head-title">BANK / HOLDER</div>
        </div>
        <div id="fields-container"></div>
    </div>

    <div class="controls">
        <div id="button-area" class="btn-row">
            <button class="btn-save" onclick="handleSave(false)">💾 SAVE & BACKUP</button>
        </div>
        <div class="btn-row">
            <button class="btn-share" onclick="openDialog()">🚀 OPTION</button>
            <button class="btn-clear" onclick="clearForm(true)">🧹 CLEAR FORM</button>
        </div>
        
        <input type="text" id="search-inp" placeholder="🔍 Search..." onkeyup="filterList()" style="width:100%; padding:8px; margin:10px 0; border-radius:8px;">
        
        <div class="dashboard">
            <div class="dash-btn" onclick="exportJSON()">📤 Backup</div>
            <div class="dash-btn" onclick="document.getElementById('fileInput').click()">📥 Restore</div>
            <div class="dash-btn" onclick="togglePrivacy()">👁️ Blur</div>
            <div class="dash-btn"><span id="count-total">0</span> Files</div>
        </div>
        <input type="file" id="fileInput" style="display:none" onchange="importJSON(event)">
    </div> 
    <div id="data-list" style="width: 100%; padding: 10px;"></div>
</div>

<script>
    let currentEditID = null;
    const fieldConfig = [
        ["AGENT NAME", "agent"], ["BANK NAME", "bank"], ["HOLDER NAME", "holder"],
        ["A/C TYPE", "acctype"], ["A/C NO.", "acc"], ["IFSC CODE", "ifsc"], 
        ["BRANCH", "branch"], ["MOBILE NO.", "mobile"], ["CUST ID", "custid"],
        ["USER ID", "userid"], ["NET L PASS", "netl"], ["NET T PASS", "nett"],
        ["MOB M PIN", "mpin"], ["MOB T PIN", "mobt"], ["UPI PIN", "upi"], 
        ["DEBIT CARD", "debit"], ["ATM PIN", "atmpin"], ["CVV/EXP", "cvv"], 
        ["MOTHER", "mother"], ["NOMINEE", "nominee"], ["PAN CARD", "pan"],
        ["DOB", "dob"], ["EMAIL ID", "email"], ["ADDRESS", "addr"]
    ];

    function getFirstWord(str) { return str ? str.trim().split(' ')[0].toUpperCase() : ""; }

    const container = document.getElementById('fields-container');
    fieldConfig.forEach((f, index) => {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
            <div class="label">${f[0]}</div>
            <div class="input-wrapper">
                <div class="input-box" id="inp-${f[1]}" contenteditable="true" 
                     oninput="liveUpdate(); autoSaveDraft();" 
                     onkeydown="handleEnter(event, ${index})"></div>
            </div>`;
        container.appendChild(row);
    });

    function handleEnter(e, index) {
        if (e.key === 'Enter') {
            e.preventDefault();
            const next = fieldConfig[index + 1];
            if (next) document.getElementById('inp-' + next[1]).focus();
        }
    }

    function autoSaveDraft() {
        const draft = {};
        fieldConfig.forEach(f => {
            draft[f[1]] = document.getElementById('inp-'+f[1]).innerText.trim();
        });
        localStorage.setItem('BankDraft', JSON.stringify(draft));
    }

    function loadDraft() {
        const draft = JSON.parse(localStorage.getItem('BankDraft'));
        if(draft) {
            fieldConfig.forEach(f => {
                document.getElementById('inp-'+f[1]).innerText = draft[f[1]] || "";
            });
            liveUpdate();
        }
    }

    function liveUpdate() {
        const ag = document.getElementById('inp-agent').innerText;
        const bk = document.getElementById('inp-bank').innerText;
        const ho = document.getElementById('inp-holder').innerText;
        document.getElementById('head-agent').innerText = getFirstWord(ag) || "NAME";
        document.getElementById('head-title').innerText = (getFirstWord(bk) || "BANK") + " / " + (getFirstWord(ho) || "HOLDER");
    }

    function handleSave(isNew) {
        const hFull = document.getElementById('inp-holder').innerText.trim();
        if(!hFull) return alert("HOLDER NAME IS REQUIRED!");
        let stored = JSON.parse(localStorage.getItem('BankProData')) || [];
        const data = { id: (isNew || !currentEditID) ? Date.now() : currentEditID };
        fieldConfig.forEach(f => { data[f[1]] = document.getElementById('inp-'+f[1]).innerText.trim(); });
        if (!isNew && currentEditID) { stored = stored.map(i => i.id === currentEditID ? data : i); }
        else { stored.unshift(data); }
        localStorage.setItem('BankProData', JSON.stringify(stored));
        localStorage.removeItem('BankDraft');
        alert("SAVED!");
        clearForm(false);
        renderList();
    }

    function renderList() {
        const listDiv = document.getElementById('data-list');
        const stored = JSON.parse(localStorage.getItem('BankProData')) || [];
        listDiv.innerHTML = "";
        document.getElementById('count-total').innerText = stored.length;
        stored.forEach(item => {
            const div = document.createElement('div');
            div.className = 'list-item';
            const ag = getFirstWord(item.agent) || "N/A";
            const bk = getFirstWord(item.bank) || "N/A";
            const ho = getFirstWord(item.holder) || "N/A";
            div.innerHTML = `
                <span style="color:#edf759; font-weight:bold;">${ho}</span> * <span style="color:#07f448;">${bk}</span> 
                <span style="color:#2ae1f8; font-size:10px;">(Agent:${ag})</span>`;
            div.onclick = () => loadItem(item.id);
            listDiv.appendChild(div);
        });
    }

    function loadItem(id) {
        const stored = JSON.parse(localStorage.getItem('BankProData')) || [];
        const item = stored.find(i => i.id === id);
        currentEditID = id;
        fieldConfig.forEach(f => { document.getElementById('inp-'+f[1]).innerText = item[f[1]] || ""; });
        liveUpdate();
        document.getElementById('button-area').innerHTML = `<button style="background:var(--neon-purple)" onclick="handleSave(false)">UPDATE</button> <button style="background:red" onclick="deleteItem()">DELETE</button>`;
    }

    function deleteItem() {
        if(!confirm("DELETE THIS RECORD?")) return;
        let stored = JSON.parse(localStorage.getItem('BankProData')) || [];
        stored = stored.filter(i => i.id !== currentEditID);
        localStorage.setItem('BankProData', JSON.stringify(stored));
        clearForm(false);
        renderList();
    }

    function clearForm(ask) {
        if(ask && !confirm("CLEAR?")) return;
        fieldConfig.forEach(f => document.getElementById('inp-'+f[1]).innerText = "");
        localStorage.removeItem('BankDraft');
        currentEditID = null;
        liveUpdate();
        document.getElementById('button-area').innerHTML = `<button class="btn-save" onclick="handleSave(false)">💾 SAVE & BACKUP</button>`;
    }

    function filterList() {
        const q = document.getElementById('search-inp').value.toLowerCase();
        Array.from(document.getElementsByClassName('list-item')).forEach(it => {
            it.style.display = it.innerText.toLowerCase().includes(q) ? "block" : "none";
        });
    }

    async function processImage(mode) {
        closeDialog();
        const element = document.getElementById('form-to-share');
        const canvas = await html2canvas(element, { scale: 2 });
        const url = canvas.toDataURL("image/png");
        if (mode === 'share') {
            const a = document.createElement('a'); a.href = url; a.download = "BankDetail.png"; a.click();
        } else {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF(); pdf.addImage(url, 'PNG', 10, 10, 190, 0); pdf.save("BankDetail.pdf");
        }
    }

    function togglePrivacy() { document.querySelectorAll('.input-box').forEach(el => el.style.filter = el.style.filter ? '' : 'blur(8px)'); }
    function exportJSON() {
        const data = localStorage.getItem('BankProData');
        const blob = new Blob([data], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "Backup.json"; a.click();
    }
    function importJSON(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { localStorage.setItem('BankProData', ev.target.result); renderList(); alert("Restored!"); };
        reader.readAsText(e.target.files[0]);
    }
    function openDialog() { document.getElementById('overlay').style.display = 'flex'; }
    function closeDialog() { document.getElementById('overlay').style.display = 'none'; }
    window.onload = () => { renderList(); loadDraft(); };
</script>
</body>
</html>
