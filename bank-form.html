<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Agent Pro - Secure Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --bg-body: #121212; --neon-purple: #bc13fe; --neon-cyan: #00f3ff; --danger: #ff4757; }
        * { box-sizing: border-box; font-family: 'Arial Black', sans-serif; }
        body { margin: 10px; background: var(--bg-body); color: #fff; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 480px; background: #1a1a1a; min-height: 100vh; padding-bottom: 20px;}
        #form-to-share { background: #0a1f14; padding: 4px; border: 5px solid #075e74; display: none; } 
        .header-box { background: linear-gradient(145deg, #840bd2, #840bd2); padding: 2px 20px; text-align: center; margin-bottom: 5px; border: 3px solid #fff; display: flex; flex-direction: column; align-items: center; gap: 1px; }
        .title-design { background: linear-gradient(180deg, #840b 50%, #840b 50%); padding: 2px 8px; border-radius: 9px; color: white; border: 3px solid #fff657; min-width: 50%; font-weight: 900; text-transform: uppercase; font-size: 14px; }
        
        /* Auto-height Rows */
        .row { display: flex; flex-direction: row; background: #fafbacc1; padding: 2px 0px; align-items: stretch; border-bottom: 1px solid #ccc; }
        .label { width: 120px; min-width: 90px; padding: 5px 4px; font-size: 11px; font-weight: bold; color: #fff; background: #9844eb; border: 2px solid #100d0d; display: flex; align-items: center; }
        
        .input-wrapper { width: 100%; background: white; display: flex; border: 2px solid #000000; min-height: 30px; }
        
        /* Flexible Input Boxes */
        .input-box { 
            width: 100%; border: none; outline: none; background: transparent; 
            font-size: 16px; font-weight: 900; color: black; 
            padding: 4px; min-height: 24px;
            word-break: break-word; /* ज़़्यादा लिखने पर अपने आप नीचे जाएगा */
            white-space: pre-wrap; 
        }

        textarea.input-box { 
            resize: none; 
            overflow: hidden; 
            display: block; 
        }
        
        .input-box[contenteditable="false"], textarea.input-box[readonly] { background: #e0e0e0; color: #555; cursor: not-allowed; }

        .controls { background: #0c700682; padding: 2px; width: 100%; margin-top: 0px; }
        .btn-row { display: flex; width: 100%; }
        
        button { border: 2px solid #fff; border-radius: 10px; font-weight: 900; cursor: pointer; color: white; padding: 10px 2px; font-size: 9px; flex: 1; text-transform: uppercase; box-shadow: inset 0 2px 9px rgba(0,0,0,0.5); transition: 0.1s; }

        .main-action-container { position: relative; width: 100%; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }

        .btn-save { background: #27ae60 !important; color: white !important; border: 2px solid #000 !important; font-size: 14px !important; font-weight: bold !important; box-shadow: 0 5px 0 #000 !important; cursor: pointer; border-radius: 15px !important; padding: 12px; width: 100%; display: block; text-shadow: none; }
        .btn-save:active { transform: translateY(3px); box-shadow: 0 2px 0 #000 !important; }

        .del-modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:4000; justify-content:center; align-items:center; backdrop-filter: blur(5px); }
        .del-modal-box { background: #ffcccc; padding: 15px; border-radius: 15px; border: 4px solid #333; text-align: center; width: 85%; max-width: 280px; }
        .del-input { width: 90%; padding: 10px; margin: 10px 0; text-align: center; border: 2px solid #ff4757; border-radius: 8px; font-size: 18px; background: white; color: black; }
        #search-inp { width: 100%; padding: 6px; border-radius: 8px; margin-top: 2px; border: 2px solid var(--neon-cyan); background: #edededeb; color: #000; font-weight: bold; }
        .list-item { background: #e7eae879; padding: 4px 10px; margin-bottom: 1px; border-radius: 6px; border-left: 5px solid var(--neon-cyan); cursor: pointer; display: flex; justify-content: space-between; align-items: center; min-height: 35px; }
        .dashboard { display: flex; gap: 5px; padding: 0px 5px; width: 100%; justify-content: center; }
        .dash-btn { flex: 10; padding: 2px 0px; text-align: center; font-size: 10px; color: #fff; background: linear-gradient(180deg, #f33737d2 0%, #51494999 100%); border: 2px solid #fff; border-radius: 10px; min-height: 15px; }
    </style>
</head>
<body>

<div class="del-modal-overlay" id="delOverlay">
    <div class="del-modal-box">
        <h3 style="color:var(--danger); margin:0;">🔐 PASSWORD REQUIRED</h3>
        <input type="password" id="delPassInput" class="del-input" placeholder="ENTER PASSWORD">
        <div class="btn-row">
            <button style="background:var(--danger);" id="confirmDelBtn">CONFIRM</button>
            <button style="background:#333;" onclick="closeDelModal()">CANCEL</button>
        </div>
    </div>
</div>

<div class="app-container">
    <div id="form-to-share">
       <div class="header-box">
            <div class="title-design" id="head-agent">AGENT : NAME</div>
            <div class="title-design" id="head-title">BANK / HOLDER</div>
        </div>
        <div id="fields-container"></div>
    </div>

    <div class="controls">
        <div id="button-area" style="padding: 5px;">
            <div id="main-btn-container">
                <div class="main-action-container">
                    <button class="btn-save" id="main-action-btn" onclick="handleMainAction()">NEW ENTRY</button>
                </div>
            </div>

            <div class="btn-row" style="display: flex; gap: 2px;">
                <button style="background: #4285F4; flex: 1;" onclick="saveToSheet()">📤 BACKUP </button>
                <button style="background: #f4b400; color: #000; flex: 1;" onclick="importFromSheet()">📥 RESTORE </button>
                <button style="background: #bc13fe; flex: 1;" onclick="toggleOptionMenu()">⚙️ OPTION</button>
                <button style="background: #34495e; flex: 1;" onclick="refreshApp()">🔄 BACK </button>
            </div>

            <div id="option-menu" style="display: none; background: #222; padding: 5px; border: 1px solid #fff; margin-top: 2px; border-radius: 5px;">
                <div style="display: flex; gap: 2px;">
                    <button style="background: #e91e63; flex: 1; padding: 5px;" onclick="downloadPDF()">📄 PDF</button>
                    <button style="background: #25D366; flex: 1; padding: 5px;" onclick="shareWhatsApp()">💬 WHATSAPP</button>
                </div>
            </div>
        </div>

        <div style="display:flex; align-items:center; gap:2px; margin-top:8px; padding: 0 5px;">
            <input type="text" id="search-inp" placeholder="🔍 SEARCH..." onkeyup="filterList()"
                   style="flex:1; height:30px; padding:6px; font-size:13px; border-radius:10px; border:2px solid #00f3ff; background:#edededeb; font-weight:bold;">
            
            <button onclick="document.getElementById('search-inp').value=''; filterList();"
                style="width:80px; height:30px; flex:0 0 auto; padding:0; font-size:11px; background:linear-gradient(145deg,#ff4d4d,#b30000); color:white; border:2px solid black; border-radius:10px; box-shadow:0 4px 0 black;">
                Clear
            </button>
        </div>
        
        <div class="dashboard" style="margin-top:8px;">
            <div class="dash-btn"><span id="count-total" style="font-size: 13px;">0</span><br>FILES SAVED</div>
        </div>
    </div> 
    <div id="data-list" style="width: 100%; padding: 10px;"></div>
</div>

<script>
    let currentEditID = null;
    let deleteID = null;
    let pendingAction = null; 
    let pressTimer;
    const SECRET_PASS = "1234"; 
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxpxoC5YWNTYtR8KtkLNZFmbgclWGW9FcBvYFK9hAd4bBBMARQJAJCp8Xgu2dedXfW6kQ/exec'; 

    const fieldConfig = [
        ["AGENT NAME", "agent"], ["BANK NAME", "bank"], ["HOLDER NAME", "holder"],
        ["A/C TYPE", "acctype"], ["A/C NO.", "acc"], ["IFSC CODE", "ifsc"], 
        ["BRANCH", "branch"], ["MOBILE NO.", "mobile"], ["CUST ID", "custid"],
        ["USER ID", "userid"], ["NET L PASS", "netl"], ["NET T PASS", "nett"],
        ["MOB M PIN", "mpin"], ["MOB T PIN", "mobt"], ["UPI PIN", "upi"], 
        ["DEBIT CARD", "debit"], ["ATM PIN", "atmpin"], ["CVV/EXP", "cvv"], 
        ["MOTHER", "mother"], ["NOMINEE", "nominee"], ["PAN CARD", "pan"],
        ["DOB", "dob"], ["EMAIL ID", "email"], ["ADDRESS", "addr"]
    ];

    function getFirstWord(str) { return str ? str.trim().split(' ')[0].toUpperCase() : ""; }

    // Dynamic field creation
    const container = document.getElementById('fields-container');
    fieldConfig.forEach((f, index) => {
        const row = document.createElement('div');
        row.className = 'row';
        
        let inputHtml = "";
        if(f[1] === 'addr') {
            // Address specifically uses textarea for Enter key support
            inputHtml = `<textarea class="input-box" id="inp-${f[1]}" oninput="liveUpdate(); autoResize(this);" placeholder=" "></textarea>`;
        } else {
            // Other fields use div contenteditable for auto-expand
            inputHtml = `<div class="input-box" id="inp-${f[1]}" contenteditable="true" oninput="liveUpdate()" onkeydown="handleEnter(event, ${index})"></div>`;
        }

        row.innerHTML = `<div class="label">${f[0]}</div><div class="input-wrapper">${inputHtml}</div>`;
        container.appendChild(row);
    });

    // Handle Enter key behavior
    function handleEnter(e, index) {
        if (e.key === 'Enter') {
            e.preventDefault(); // Div box mein Enter se line nahi badhegi
            const nextField = fieldConfig[index + 1];
            if (nextField) {
                const nextEl = document.getElementById('inp-' + nextField[1]);
                nextEl.focus();
                // Move cursor to end
                if (nextEl.tagName !== 'TEXTAREA') {
                    const range = document.createRange();
                    const sel = window.getSelection();
                    range.selectNodeContents(nextEl);
                    range.collapse(false);
                    sel.removeAllRanges();
                    sel.addRange(range);
                }
            }
        }
    }

    // Auto-resize for Address Textarea
    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    function setFormLock(isLocked) {
        fieldConfig.forEach(f => {
            const el = document.getElementById('inp-' + f[1]);
            if (el.tagName === 'TEXTAREA') {
                el.readOnly = isLocked;
            } else {
                el.contentEditable = !isLocked;
            }
        });
    }

    function refreshApp() {
        toggleForm(false);
        document.getElementById('search-inp').value = "";
        clearFormFields();
        renderList();
    }

    function clearFormFields() {
        fieldConfig.forEach(f => { 
            const el = document.getElementById('inp-'+f[1]); 
            if(el.tagName === 'TEXTAREA') { el.value = ""; el.style.height="30px"; } else { el.innerText = ""; }
        });
        currentEditID = null;
        liveUpdate();
    }

    function toggleForm(show, mode = 'new') {
        const form = document.getElementById('form-to-share');
        const btnContainer = document.getElementById('main-btn-container');
        
        if (show) {
            form.style.display = 'block';
            if(mode === 'edit') {
                setFormLock(true);
                btnContainer.innerHTML = `
                    <div class="main-action-container" id="edit-controls" style="gap:5px;">
                  <button class="btn-save" style="background:#e67e22 !important;" onclick="askUnlock()"> UNLOCK EDIT</button>
                    </div>`;
            } else {
                setFormLock(false);
                btnContainer.innerHTML = `
                    <div class="main-action-container">
                        <button class="btn-save" onclick="handleSave(false); toggleForm(false);">SAVE ENTRY</button>
                    </div>`;
            }
        } else {
            form.style.display = 'none';
            btnContainer.innerHTML = `
                <div class="main-action-container">
                    <button class="btn-save" onclick="handleMainAction()">NEW ENTRY</button>
                </div>`;
        }
    }

    function askUnlock() {
        pendingAction = "unlock";
        document.getElementById('delOverlay').style.display = 'flex';
    }

    function unlockForm() {
        setFormLock(false);
        const btnContainer = document.getElementById('main-btn-container');
        btnContainer.innerHTML = `
            <div class="main-action-container" style="gap:5px;">
                <button class="btn-save" style="background:#f39c12 !important; flex:1;" onclick="handleSave(false)">UPDATE</button>
                <button class="btn-save" style="background:#3498db !important; flex:1;" onclick="handleSave(true)">SAVE NEW</button>
            </div>`;
    }

    document.getElementById('confirmDelBtn').onclick = () => {
        if(document.getElementById('delPassInput').value === SECRET_PASS) {
            if (pendingAction === "unlock") {
                unlockForm();
                closeDelModal();
            } else if (pendingAction === "delete") {
                let stored = JSON.parse(localStorage.getItem('BankProData') || '[]');
                stored = stored.filter(i => i.id !== deleteID);
                localStorage.setItem('BankProData', JSON.stringify(stored));
                renderList(); closeDelModal(); alert("DELETED!");
            }
        } else alert("WRONG PASSWORD!");
    };

    function handleMainAction() { clearFormFields(); toggleForm(true, 'new'); }

    function liveUpdate() {
        const getVal = (id) => { const el = document.getElementById('inp-'+id); return (el.tagName === 'TEXTAREA' ? el.value : el.innerText).trim(); }
        document.getElementById('head-agent').innerText = (getFirstWord(getVal('agent')) || "NAME");
        document.getElementById('head-title').innerText = (getFirstWord(getVal('bank')) || "BANK") + " / " + (getFirstWord(getVal('holder')) || "HOLDER");
    }

    function handleSave(forceNew) {
        const hFull = (document.getElementById('inp-holder').tagName === 'TEXTAREA' ? document.getElementById('inp-holder').value : document.getElementById('inp-holder').innerText).trim();
        if(!hFull) return alert("HOLDER NAME IS REQUIRED!");
        let stored = JSON.parse(localStorage.getItem('BankProData')) || [];
        const data = { id: forceNew ? Date.now() : (currentEditID || Date.now()) };
        fieldConfig.forEach(f => { const el = document.getElementById('inp-'+f[1]); data[f[1]] = (el.tagName === 'TEXTAREA' ? el.value : el.innerText).trim(); });
        if (!forceNew && currentEditID) { stored = stored.map(i => i.id === currentEditID ? data : i); } else { stored.unshift(data); }
        localStorage.setItem('BankProData', JSON.stringify(stored));
        renderList(); toggleForm(false);
    }

    function renderList() {
        const listDiv = document.getElementById('data-list');
        const stored = JSON.parse(localStorage.getItem('BankProData') || '[]');
        listDiv.innerHTML = ""; document.getElementById('count-total').innerText = stored.length;
        stored.forEach(item => {
            const div = document.createElement('div'); div.className = 'list-item';
            div.innerHTML = `
                <div class="list-main-info" style="font-weight: 700; display: flex; gap: 1px; align-items: center;">
                    <span style="color:#07f448; font-size: 12px;">${getFirstWord(item.bank)}</span>
                    <span style="color:white; font-size: 20px;"> * </span>
                    <span style="color:#edf759; font-size: 12px;">${getFirstWord(item.holder)}</span>
                </div>
                <div class="list-agent-info" style="color: #0908e4fa; font-weight: 900; font-size: 11px;">
                    (Agent:${getFirstWord(item.agent)})
                </div>`;
            div.onclick = () => loadItem(item.id);
            div.onmousedown = () => startPress(item.id);
            div.onmouseup = () => cancelPress();
            div.ontouchstart = () => startPress(item.id);
            div.ontouchend = () => cancelPress();
            listDiv.appendChild(div);
        });
    }

    function startPress(id) { 
        pressTimer = window.setTimeout(() => { 
            deleteID = id; 
            pendingAction = "delete";
            document.getElementById('delOverlay').style.display = 'flex'; 
        }, 300); 
    }
    function cancelPress() { clearTimeout(pressTimer); }
    function closeDelModal() { document.getElementById('delOverlay').style.display = 'none'; document.getElementById('delPassInput').value = ""; deleteID = null; pendingAction = null; }

    function loadItem(id) {
        const stored = JSON.parse(localStorage.getItem('BankProData') || '[]');
        const item = stored.find(i => i.id === id);
        currentEditID = id;
        fieldConfig.forEach(f => { 
            const el = document.getElementById('inp-'+f[1]); 
            if(el.tagName === 'TEXTAREA') { 
                el.value = item[f[1]] || ""; 
                // Auto-expand address on load
                setTimeout(() => autoResize(el), 10);
            } else {
                el.innerText = item[f[1]] || ""; 
            }
        });
        liveUpdate(); toggleForm(true, 'edit');
    }
    // Remaining functions (Sync, Import, Filter, PDF, WhatsApp) remain the same...
    async function saveToSheet() {
    // LocalStorage se poora data nikalna
    const storedData = localStorage.getItem('BankProData');
    
    if (!storedData || storedData === '[]') {
        alert("No data to backup!");
        return;
    }
    try {
        // Poori list ko ek sath cloud par bhejna
        await fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: storedData 
        });
        alert("Full Backup Successful!");
    } catch (e) {
        alert("Backup Failed!");
    }
}
async function importFromSheet() {
    if (!confirm("Restore all data from cloud? This will replace your current list.")) return;
    try {
        const response = await fetch(scriptURL);
        const sheetData = await response.json();
        
        if (sheetData && Array.isArray(sheetData)) {
            // Cloud se aaya data mobile mein save karna
            localStorage.setItem('BankProData', JSON.stringify(sheetData));
            renderList(); // List ko screen par update karna
            alert("Full Restore Successful!");
        } else {
            alert("No valid data found on Google Sheet!");
        }
    } catch (e) {
        alert("Restore Failed!");
    }
}
    function filterList() {
        const q = document.getElementById('search-inp').value.toLowerCase().trim();
        Array.from(document.getElementsByClassName('list-item')).forEach(it => { 
            it.style.display = it.innerText.toLowerCase().includes(q) ? "flex" : "none"; 
        });
    }
    function toggleOptionMenu() {
        const menu = document.getElementById('option-menu');
        menu.style.display = (menu.style.display === 'none' || menu.style.display === '') ? 'block' : 'none';
    }
    async function downloadPDF() {
        const el = document.getElementById('form-to-share');
        el.style.display = 'block'; 
        const canvas = await html2canvas(el, { scale: 2, useCORS: true });
        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const imgWidth = 190;
        const pageHeight = (canvas.height * imgWidth) / canvas.width;
        const pdf = new jsPDF('p', 'mm', [210, pageHeight + 20]); 
        pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, pageHeight);
        pdf.save("BankDetails.pdf");
        el.style.display = 'none';
    }
    async function shareWhatsApp() {
        const el = document.getElementById('form-to-share');
        el.style.display = 'block';
        const canvas = await html2canvas(el, { scale: 2, useCORS: true });
        canvas.toBlob(blob => {
            const file = new File([blob], "details.png", { type: 'image/png' });
            if (navigator.share) {
                navigator.share({ files: [file], title: 'Bank Details' });
            } else {
                alert("Sharing not supported.");
            }
            el.style.display = 'none';
        });
    }
    window.onload = renderList;
</script>
</body>
</html>
