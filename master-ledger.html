<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Ledger V20 - Secure</title>
    <style>
        :root {
            --sahil: #1659f2;
            --arman: #0df147;
            --gray-entry: #d6d6d6;
            --light-yellow: #fff6a3;
            --blue-receive: #6ec6ff;
            --red-balance: #ff4d4d;
            --dark-green: #00c853;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #a9a2a2c8; margin: 0; padding: 2px; font-size: 10px; -webkit-user-select: none; user-select: none; }
        .container { max-width: 100%; margin: auto; background: #43a5ee; border: 2px solid #333; border-radius: 25px; overflow: hidden; padding-top: 3px; }
        .tabs { display: flex; background: transparent; padding: 5px; padding-top: 5px; gap: 10px; }
        .tab-btn { flex: 1; padding: 8px; border: 2px solid #000; font-weight: bold; border-radius: 12px; background: #555; color: #fff; box-shadow: 0 3px 0 #222; font-size: 11px; }
        .active-sahil { background: var(--sahil) !important; border: 2px solid #fff; box-shadow: 0 0 10px #ff00ff !important; }
        .active-arman { background: var(--arman) !important; color: black !important; border: 2px solid #fff; box-shadow: 0 0 10px #ff00ff !important; }
        .main-header { text-align: center; font-weight: bold; font-size: 18px; padding: 10px; border-radius: 80px; margin: 5px; border: 5px solid #000; outline: 2px solid #fff; outline-offset: -4px; box-shadow: 0 7px 0 #444348; }
        .sahil-theme { background: var(--sahil); color: white; cursor: default; }
        .arman-theme { background: var(--arman); color: black; cursor: pointer; }
        .summary-dash { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 8px; }
        .s-box { padding: 6px 0px; border-radius: 10px; text-align: center; color: white; font-weight: bold; font-size: 9px; border: 2px solid #000; box-shadow: 0 2px 0 #000; }
        .admin-controls { padding: 6px; background: lightblue; border-radius: 12px; margin: 3px 1px; border: 2px solid #000; box-shadow: 0 3px 0 #000; }
        .btn-sq { border: 2px solid #000; color: white; font-weight: bold; font-size: 9px; cursor: pointer; padding: 5px; box-shadow: 0 2px 0 #000; border-radius: 8px; height: 28px; }
        .btn-add-main { background: #27ae60; color: white; border: 2px solid #000; font-size: 12px; font-weight: bold; box-shadow: 0 3px 0 #000; border-radius: 8px; width: 100%; padding: 6px; margin-top: 4px; }
        .table-scroll { overflow-x: auto; height: 55vh; margin-top: 5px; background: #e0e0e0; border-radius: 8px; border: 1px solid #999; }
        table { width: 100%; border-collapse: collapse; background: #bfc0bc87; min-width: 900px; }
        th { background: #3498db; color: white; border: 2px solid #333; padding: 8px; position: sticky; top: 0; font-size: 10px; }
        td { border: 1px solid #ccc; text-align: center; padding: 6px; font-weight: bold; color: black; font-size: 10px; }
        .row-gray td { background: var(--gray-entry); }
        .row-pass td:nth-child(-n+9) { background: var(--light-yellow); }
        .row-receive td:nth-child(-n+10) { background: var(--blue-receive); }
        .row-part td:nth-child(-n+13) { background: var(--red-balance); color: #fff; }
        .balance-red { background: var(--red-balance) !important; color: #fff !important; }
        .row-full td { background: var(--dark-green); color: #000; }

                /* --- नया और कम जगह वाला सर्च एरिया --- */
        .search-area { 
            padding: 5px 5px; 
            display: flex; 
            gap: 2px; 
            align-items: center; 
            margin-top: 2px; /* ऊपर वाले बटन से मामूली दूरी */
        }
        #searchInp { 
            flex: 1; 
            padding: 4px 5px; 
            border: 2px solid #180ce1bc; 
            border-radius: 10px; 
            font-size: 12px; 
            height: 20px; /* टेक्स्ट सही से दिखने के लिए परफेक्ट हाइट */
            background: #fff;
        }
        .btn-clear { 
            padding: 0 12px; 
            height: 28px; 
            font-size: 11px; 
            font-weight: bold; 
            border-radius: 10px; 
            border: 2px solid #000; 
            cursor: pointer; 
            color: white; 
            background: #e74c3c;
            display: flex;
            align-items: center;
            justify-content: center;
        }


        #entryArea { background: #9b9b9b93; padding: 8px; display: none; }
        .entry-form { max-width: 400px; margin: auto; border: 2px solid #333; padding: 10px; background: #9fced4; border-radius: 8px; }
        .form-row { display: flex; margin-bottom: 4px; align-items: center; }
        .form-row label { width: 70px; font-weight: bold; font-size: 10px; }
        .form-row input { flex: 1; padding: 4px; font-size: 11px; }
        #deleteModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 50%; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center; }
        #deleteModal > div { background: lightblue; padding: 12px; border-radius: 12px; border: 3px solid #000; text-align: center; width: 200px; }
        #delPassInput { padding: 6px; border-radius: 6px; border: 2px solid #000; width: 50%; text-align: center; margin-bottom: 10px; font-size: 10px; display: block; margin-left: auto; margin-right: auto; }
        .btn-group-delete { display: flex; gap: 2px; justify-content: center; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div id="deleteModal">
    <div>
        <h3 style="margin-top: 20;">🔐 DELETE ENTRY?</h3>
        <input type="password" id="delPassInput" placeholder="Enter Password">
        <div class="btn-group-delete">
            <button style="flex:1; background:red; color:white; padding:6px; border-radius:10px; font-weight:bold; border:2px solid black; cursor:pointer;" onclick="confirmDeletion()">DELETE</button>
            <button style="flex:1; background:grey; color:white; padding:6px; border-radius:10px; font-weight:bold; border:2px solid black; cursor:pointer;" onclick="closeDelModal()">CANCEL</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="tabs">
        <button id="tab-sahil" class="tab-btn active-sahil" onclick="switchTab('sahil')">SAHIL</button>
        <button id="tab-arman" class="tab-btn" onclick="switchTab('arman')">ARMAN</button>
    </div>
    <div id="header-title" class="main-header sahil-theme" onclick="handleHeaderClick()">
        <span>SAHIL ACCOUNT</span>
    </div>
    <div class="summary-dash">
        <div class="s-box" style="background:#1e3799">T-COUNT <span id="stat-count">0</span></div>
        <div class="s-box" style="background:#2980b9">PASSED <span id="stat-pass">0</span></div>
        <div class="s-box" style="background:#8e44ad">PENDING <span id="stat-pend">0</span></div>
        <div class="s-box" style="background:#d35400">T-PRICE <span id="stat-price">0</span></div>
        <div class="s-box" style="background:#27ae60">RECEIVED <span id="stat-rec">0</span></div>
        <div class="s-box" style="background:#ff4757">BALANCE <span id="stat-bal">0</span></div>
    </div>
</div>

<div class="admin-controls" id="adminControls">
    <div style="display: flex; gap: 4px;">
        <button class="btn-sq" style="background:#2ecc71; flex: 1;" onclick="fullBackup()">📤 BACKUP</button>
        <button class="btn-sq" style="background:#e67e22; flex: 1;" onclick="restorePrompt()">📥 RESTORE</button>
        <button class="btn-sq" style="background:#3498db; width: 70px;" onclick="refreshPage()">🔄 REFRESH</button>
    </div>
    <button class="btn-add-main" onclick="toggleForm()">➕ ADD NEW ENTRY</button>
</div>

<div id="entryArea">
    <div class="entry-form">
        <input type="hidden" id="editIndex" value="-1">
        <div class="form-row"><label>REC DATE</label><input type="text" id="f1" onblur="smartDate(this)"></div>
        <div class="form-row"><label>AGENT</label><input type="text" id="f2"></div>
        <div class="form-row"><label>HOLDER</label><input type="text" id="f3"></div>
        <div class="form-row"><label>COUNT</label><input type="number" id="f4"></div>
        <div class="form-row"><label>BANK</label><input type="text" id="f5"></div>
        <div class="form-row"><label>TIPE</label><input type="text" id="f6"></div>
        <div class="form-row"><label>PRICE</label><input type="number" id="f_pr" oninput="calcBal()"></div>
        <div class="form-row"><label>PAS DATE</label><input type="text" id="f7" onblur="smartDate(this)"></div>
        <div class="form-row"><label>RIC DATE</label><input type="text" id="f8" onblur="smartDate(this)"></div>
        <div class="form-row"><label>REC AMO.</label><input type="number" id="f_am" oninput="calcBal()"></div>
        <div class="form-row"><label>BALANCE</label><input type="text" id="f_bal_ui" readonly style="background:#eee;"></div>
        <div class="form-row"><label>BAL. DATE</label><input type="text" id="f9" onblur="smartDate(this)"></div>
        <div style="display:flex; gap:5px; margin-top:10px;">
            <button id="mainSaveBtn" class="btn-add-main" style="flex:1; background:#27ae60;" onclick="submitEntry(false)">SAVE</button>
            <button id="updateBtn" class="btn-add-main" style="flex:1; background:#f39c12; display:none;" onclick="submitEntry(false)">UPDATE</button>
            <button id="saveAsNewBtn" class="btn-add-main" style="flex:1; background:#3498db; display:none;" onclick="submitEntry(true)">NEW</button>
            <button class="btn-sq" style="background:#333; width:35px; margin-top:4px;" onclick="toggleForm()">X</button>
        </div>
    </div>
</div>

<div class="search-area">
    <input type="text" id="searchInp" placeholder="🔍 Search entries..." oninput="renderData()">
    <button onclick="clearSearch()" class="btn-clear">CLEAR</button>
</div>

<div class="table-scroll">
    <table id="mainTable">
        <thead>
            <tr>
                <th>Srl</th>
                <th>REC DATE</th>
                <th>AGENT</th>
                <th>HOLDER</th>
                <th>COUNT</th>
                <th>BANK</th>
                <th>TIPE</th>
                <th>PRICE</th>
                <th>PAS DATE</th>
                <th>RIC DATE</th>
                <th>REC. AMO</th>
                <th>STATUS</th>
                <th>BALANCE</th>
                <th>BAL. DATE</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
    const cloudURL = 'https://script.google.com/macros/s/AKfycbwj1wySlEpF6AimT7MDW7F1AKKgcIeRkcoUbz1kZz05YOg-lAxcdpCj93ppf9SwSIWLiw/exec';
    let db = JSON.parse(localStorage.getItem('shared_master_v19')) || [];
    let currentMode = 'sahil';
    let deleteIdx = -1;

    function renderData() {
        const tbody = document.getElementById('table-body');
        const search = document.getElementById('searchInp').value.toLowerCase().trim();
        tbody.innerHTML = '';
        let tCount=0, tPass=0, tPend=0, tPrice=0, tRec=0, tBal=0;

                db.forEach((item, i) => {
            if (search && !Object.values(item).join(' ').toLowerCase().includes(search)) return;
            
            let price = Number(item.g) || 0;
            let rec = Number(item.j) || 0;
            let bal = price - rec;
            let status = "PENDING", rowClass = "row-gray", lastCol = item.k || "";
            let displayBal = ""; // बैलेंस को शुरू में खाली रखा

            // अगर PAS DATE (item.h) मौजूद है, तभी बैलेंस दिखाओ
            if (item.h) { 
                displayBal = bal > 0 ? bal : ""; 
            }

            // स्टेटस और कलर का लॉजिक
            if (item.h && !item.i) { rowClass = "row-pass"; status = "PASSED"; }
            if (item.i && rec === 0) { rowClass = "row-receive"; status = "RECEIVE"; }
            if (rec > 0 && rec < price) { rowClass = "row-part"; status = "PART PAYMENT"; }
            
            // अगर फुल रिसीव हो गया
            if (item.k || (rec >= price && price > 0)) { 
                rowClass = "row-full"; 
                status = "FULL RECEIVE"; 
                rec = price; 
                displayBal = ""; // फुल होने पर बैलेंस गायब
            }

            const row = document.createElement('tr');
            row.className = rowClass;
            row.innerHTML = `
                <td>${i+1}</td>
                <td>${item.a||''}</td>
                <td>${item.b||''}</td>
                <td>${item.c||''}</td>
                <td>${item.d||''}</td>
                <td>${item.e||''}</td>
                <td>${item.f||''}</td>
                <td>${price}</td>
                <td>${item.h||''}</td>
                <td>${item.i||''}</td>
                <td>${rec}</td>
                <td>${status}</td>
                <td class="${displayBal !== "" ? 'balance-red' : ''}">${displayBal}</td>
                <td>${lastCol}</td>`;

            row.onclick = () => { if(currentMode === 'sahil') editRow(i); };
            row.oncontextmenu = (e) => { e.preventDefault(); if(currentMode === 'sahil') { deleteIdx = i; document.getElementById('deleteModal').style.display='flex'; } };
            tbody.appendChild(row);
            
            tCount++; 
            if(status !== "PENDING") tPass++; else tPend++; 
            tPrice += price; tRec += rec; tBal += (Number(displayBal) || 0);
        });

        document.getElementById('stat-count').innerText = tCount; document.getElementById('stat-pass').innerText = tPass; document.getElementById('stat-pend').innerText = tPend; document.getElementById('stat-price').innerText = tPrice; document.getElementById('stat-rec').innerText = tRec; document.getElementById('stat-bal').innerText = tBal;
    }

    function toggleForm() {
        const area = document.getElementById('entryArea');
        if (area.style.display === 'block') {
            area.style.display = 'none';
            document.getElementById('editIndex').value = "-1";
            document.querySelectorAll('.entry-form input').forEach(i => i.value = "");
            document.getElementById('mainSaveBtn').style.display = 'block';
            document.getElementById('updateBtn').style.display = 'none';
            document.getElementById('saveAsNewBtn').style.display = 'none';
        } else { area.style.display = 'block'; }
    }

    function submitEntry(forceNew) {
        let idx = parseInt(document.getElementById('editIndex').value);
        if (forceNew) idx = -1;
        let pr = Number(document.getElementById('f_pr').value) || 0;
        let am = Number(document.getElementById('f_am').value) || 0;
        let bDate = document.getElementById('f9').value;
        let finalK = bDate;
        if (bDate && !bDate.includes('(')) {
            let oldRec = (idx !== -1 && db[idx]) ? (Number(db[idx].j) || 0) : 0;
            let diff = pr - oldRec;
            if (diff > 0) finalK = `${bDate} (${diff})`;
        }
        let entry = { a: document.getElementById('f1').value, b: document.getElementById('f2').value, c: document.getElementById('f3').value, d: document.getElementById('f4').value, e: document.getElementById('f5').value, f: document.getElementById('f6').value, g: pr.toString(), h: document.getElementById('f7').value, i: document.getElementById('f8').value, j: am.toString(), k: finalK };
        if (idx === -1) db.push(entry); else db[idx] = entry;
        localStorage.setItem('shared_master_v19', JSON.stringify(db));
        toggleForm(); renderData();
    }

    function editRow(i) {
        let item = db[i];
        document.getElementById('editIndex').value = i;
        document.getElementById('f1').value = item.a; document.getElementById('f2').value = item.b; document.getElementById('f3').value = item.c; document.getElementById('f4').value = item.d; document.getElementById('f5').value = item.e; document.getElementById('f6').value = item.f; document.getElementById('f_pr').value = item.g; document.getElementById('f7').value = item.h; document.getElementById('f8').value = item.i; document.getElementById('f_am').value = item.j;
        document.getElementById('f9').value = item.k ? item.k.split(' (')[0] : "";
        document.getElementById('mainSaveBtn').style.display = 'none'; document.getElementById('updateBtn').style.display = 'block'; document.getElementById('saveAsNewBtn').style.display = 'block'; document.getElementById('entryArea').style.display = 'block';
        calcBal();
    }

    function smartDate(input) {
        let v = input.value.trim().toLowerCase(); if (!v) return;
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        let day, month, year;
        let numOnly = v.replace(/\D/g, '');
        if (numOnly.length === 6) { day = numOnly.substring(0, 2); month = monthNames[parseInt(numOnly.substring(2, 4)) - 1] || "Jan"; year = "20" + numOnly.substring(4, 6); }
        else { let parts = v.split(/[\s-]+/); if (parts.length >= 2) { day = parts[0].padStart(2, '0'); let mVal = parts[1].substring(0, 3); month = mVal.charAt(0).toUpperCase() + mVal.slice(1); year = (parts[2] && parts[2].length === 2) ? "20" + parts[2] : (parts[2] || "2026"); } }
        if (day && month && year) { let finalDate = `${day}-${month}-${year}`; if (input.id === "f9") { let pr = Number(document.getElementById('f_pr').value) || 0; let amInput = document.getElementById('f_am'); if ((pr - Number(amInput.value)) > 0) { amInput.value = pr; calcBal(); } } input.value = finalDate; }
    }

    function calcBal() { let pr = Number(document.getElementById('f_pr').value) || 0; let am = Number(document.getElementById('f_am').value) || 0; document.getElementById('f_bal_ui').value = pr - am; }
    function switchTab(mode) { currentMode = mode; document.getElementById('header-title').className = "main-header " + (mode === 'sahil' ? "sahil-theme" : "arman-theme"); document.getElementById('header-title').querySelector('span').innerText = mode.toUpperCase() + " ACCOUNT"; document.getElementById('tab-sahil').className = "tab-btn " + (mode === 'sahil' ? "active-sahil" : ""); document.getElementById('tab-arman').className = "tab-btn " + (mode === 'arman' ? "active-arman" : ""); document.getElementById('adminControls').style.display = (mode === 'sahil' ? 'block' : 'none'); document.querySelector('.container').style.background = (mode === 'arman' ? "#b2fab4" : "#43a5ee"); renderData(); }
    function handleHeaderClick() { if (currentMode === 'arman') captureReport(); }
    function captureReport() { const table = document.getElementById("mainTable"); const scrollDiv = document.querySelector('.table-scroll'); const oldH = scrollDiv.style.height; scrollDiv.style.height = "auto"; html2canvas(table, { backgroundColor: "#ffffff" }).then(canvas => { const link = document.createElement('a'); link.download = 'ARMAN_LIST.png'; link.href = canvas.toDataURL(); link.click(); scrollDiv.style.height = oldH; }); }
    async function fullBackup() { try { await fetch(cloudURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(db) }); alert("✅ Cloud Backup Successful!"); } catch(e) { alert("Backup Failed!"); } }
    async function restorePrompt() { try { let res = await fetch(cloudURL); let data = await res.json(); if(data) { db = data; localStorage.setItem('shared_master_v19', JSON.stringify(db)); renderData(); alert("✅ Data Restored!"); } } catch(e) { alert("Restore Failed!"); } }
    function clearSearch() { document.getElementById('searchInp').value = ""; renderData(); }
    function refreshPage() { location.reload(); }
    function confirmDeletion() { if(document.getElementById('delPassInput').value === "7869") { db.splice(deleteIdx, 1); localStorage.setItem('shared_master_v19', JSON.stringify(db)); renderData(); closeDelModal(); } else { alert("Wrong Password!"); } }
    function closeDelModal() { document.getElementById('deleteModal').style.display = 'none'; document.getElementById('delPassInput').value = ""; }
    document.getElementById('f9').addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); let targetBtn = (document.getElementById('updateBtn').style.display !== 'none') ? document.getElementById('updateBtn') : document.getElementById('mainSaveBtn'); targetBtn.focus(); targetBtn.style.outline = "4px solid white"; } });
    renderData();
</script>
</body>
</html>
